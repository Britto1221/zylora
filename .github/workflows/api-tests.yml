name: API Tests

on:
  push:
    paths:
      - "apps/api/**"
      - "packages/zylora-ai/**"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/zylora-ai/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ./packages/zylora-ai
      - run: python -m pip install -e "./apps/api[dev]"
      - run: cd apps/api && pytest
