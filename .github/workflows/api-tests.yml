name: API Quality

on:
  push:
    paths:
      - "apps/api/**"
      - "packages/zylora-ai/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/zylora-ai/**"
      - ".github/workflows/api-tests.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: python -m pip install -e ./packages/zylora-ai
      - run: python -m pip install -e "./apps/api[dev]"
      - run: cd apps/api && ruff check app tests
      - run: cd apps/api && mypy app
      - run: cd apps/api && pytest
