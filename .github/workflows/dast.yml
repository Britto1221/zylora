name: DAST
on:
  workflow_dispatch:
    inputs:
      target:
        description: Staging URL
        required: true
permissions:
  contents: read
jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target }}
          rules_file_name: tests/dast/zap-rules.tsv
          fail_action: true
