name: Web Quality

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "package*.json"
      - ".github/workflows/web-tests.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "package*.json"
      - ".github/workflows/web-tests.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci || npm install
      - run: npm run typecheck:web
      - run: npm run build:web
