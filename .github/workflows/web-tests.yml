name: Web Tests

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/ui/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run typecheck:web
      - run: npm run build:web
