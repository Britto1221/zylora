version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: zylora_postgres
    environment:
      POSTGRES_USER: zylora
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zylora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zylora_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
