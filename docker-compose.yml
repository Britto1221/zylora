services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: zylora
      POSTGRES_USER: zylora
      POSTGRES_PASSWORD: zylora
    ports:
      - "5432:5432"
    volumes:
      - zylora_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zylora -d zylora"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - zylora_redis:/data

volumes:
  zylora_postgres:
  zylora_redis:
