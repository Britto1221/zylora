listen_addresses = '*'
port = 5432
ssl = on
ssl_cert_file = '/var/lib/postgresql/zylora-certs/server.crt'
ssl_key_file = '/var/lib/postgresql/zylora-certs/server.key'
ssl_ca_file = '/var/lib/postgresql/zylora-certs/ca.crt'
password_encryption = 'scram-sha-256'
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %u@%d '
